name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.3"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_CYCLONEDX_VERSION: "0.5.9"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            name: windows-x86_64
            suffix: windows-x86_64.zip
          - os: windows-11-arm
            name: windows-arm64
            suffix: windows-arm64.zip
          - os: ubuntu-24.04
            name: linux-x86_64
            suffix: linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            name: linux-aarch64
            suffix: linux-aarch64.tar.gz
          - os: macos-15
            name: macos-arm64
            suffix: macos-arm64.tar.gz
          - os: macos-15-intel
            name: macos-x86_64
            suffix: macos-x86_64.tar.gz
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - name: Build Windows release artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\build-windows.ps1 -Release

      - name: Package Windows release artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $archiveName = "runseal-$($env:RELEASE_TAG)-${{ matrix.suffix }}"
          $archive = Join-Path "dist" $archiveName
          Compress-Archive -LiteralPath `
            target\release\runseal.exe,`
            target\release\runseal-windows-sandbox-setup.exe,`
            target\release\runseal-command-runner.exe `
            -DestinationPath $archive
          $sha = [System.Security.Cryptography.SHA256]::Create()
          $stream = [System.IO.File]::OpenRead((Resolve-Path $archive))
          try {
            $hash = ($sha.ComputeHash($stream) | ForEach-Object { $_.ToString("x2") }) -join ""
          } finally {
            $stream.Dispose()
            $sha.Dispose()
          }
          Set-Content -NoNewline -LiteralPath "$archive.sha256" -Value "$hash  $archiveName"

      - name: Build Unix release artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive="runseal-${RELEASE_TAG}-${{ matrix.suffix }}"
          cargo build --release --bin runseal
          mkdir -p dist package
          cp target/release/runseal package/runseal
          tar -C package -czf "dist/$archive" runseal
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "$archive" > "$archive.sha256")
          else
            (cd dist && shasum -a 256 "$archive" > "$archive.sha256")
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: runseal-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: write
      id-token: write
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0

      - name: Download release artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate release SBOM
        run: |
          set -euo pipefail
          cargo install cargo-cyclonedx --locked --version "$CARGO_CYCLONEDX_VERSION"
          cargo cyclonedx --format json --target all --override-filename "runseal-${RELEASE_TAG}-sbom.cdx"
          mv "runseal-${RELEASE_TAG}-sbom.cdx.json" dist/

      - name: Generate aggregate checksums
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f \
            ! -name '*.sha256' \
            ! -name '*-sbom.cdx.json' \
            ! -name 'SHA256SUMS' \
            -printf '%f\0' |
            sort -z |
            xargs -0 -I{} sha256sum "dist/{}" > dist/SHA256SUMS

      - name: Attest release artifact provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Attest release SBOM
        uses: actions/attest-sbom@51e74621a501c89df81fc1391c5a8f4cfc9fab2f # v3
        with:
          subject-checksums: dist/SHA256SUMS
          sbom-path: dist/runseal-${{ env.RELEASE_TAG }}-sbom.cdx.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            echo "## RunSeal ${RELEASE_TAG#v}"
            echo
            echo "Automated release for $RELEASE_TAG."
            echo
            echo "### Artifacts"
            find dist -maxdepth 1 -type f ! -name '*.sha256' -printf "- %f\n" | sort
          } > release-notes.md
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "RunSeal ${RELEASE_TAG#v}" \
              --notes-file release-notes.md \
              --latest
          fi
