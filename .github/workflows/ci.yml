name: ci

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: clippy,rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --tests -- -D warnings

      - name: Install Linux sandbox dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap

      - name: Run tests
        run: cargo test

      - name: Check whitespace
        run: git diff --check

      - name: Run redaction scan
        shell: pwsh
        run: |
          $pattern = "tailos|tyclaw|myprojects|ferstar|private issue|private MR"
          $allowed = '^(./|.\\)?(AGENTS\.md|\.github[/\\]workflows[/\\]ci\.yml):'
          $files = Get-ChildItem -Recurse -File |
            Where-Object { $_.FullName -notmatch '[\\/]target[\\/]' }
          $matches = $files | Select-String -Pattern $pattern -CaseSensitive:$false |
            ForEach-Object {
              $path = Resolve-Path -Relative $_.Path
              "${path}:$($_.LineNumber):$($_.Line)"
            }
          $disallowed = $matches | Where-Object { $_ -and ($_ -notmatch $allowed) }

          if ($disallowed) {
            $disallowed | ForEach-Object { Write-Output $_ }
            exit 1
          }
